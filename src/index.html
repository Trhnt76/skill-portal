
<h2 class="sr-only">Skill roadmap tracker across five engineering disciplines. Click any skill card to cycle its status from not started through to expert.</h2>

<style>
*{box-sizing:border-box}
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.25rem}
.tab-btn{background:none;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:5px 11px;font-size:12px;cursor:pointer;color:var(--color-text-secondary);font-family:var(--font-sans)}
.tab-btn.active{border-color:var(--color-border-primary);color:var(--color-text-primary);background:var(--color-background-secondary);font-weight:500}
.legend{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:1rem;align-items:center}
.leg-it{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--color-text-secondary)}
.sum-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
.tk-title{font-size:15px;font-weight:500;color:var(--color-text-primary)}
.tk-pct{font-size:12px;color:var(--color-text-secondary)}
.pb-bg{height:5px;background:var(--color-background-secondary);border-radius:3px;margin-bottom:1.25rem;overflow:hidden}
.pb-fill{height:100%;border-radius:3px;transition:width .4s}
.sk-row{display:flex;gap:12px;align-items:flex-start;margin-bottom:10px}
.dot{width:14px;height:14px;border-radius:50%;border:2px solid;flex-shrink:0;margin-top:4px;cursor:pointer;transition:transform .15s}
.dot:hover{transform:scale(1.3)}
.sk-card{flex:1;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:9px 12px;cursor:pointer;transition:border-color .15s}
.sk-card:hover{border-color:var(--color-border-secondary)}
.sk-card.rh{border:1px solid #378ADD}
.card-top{display:flex;align-items:center;justify-content:space-between;gap:8px}
.sk-nm{font-size:13px;font-weight:500;color:var(--color-text-primary);flex:1;line-height:1.4}
.pill{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:500;white-space:nowrap;flex-shrink:0;border:0.5px solid}
.ov{font-size:10px;color:var(--color-text-tertiary);margin-top:3px}
.bar-bg{height:3px;background:var(--color-background-secondary);border-radius:2px;margin-top:7px}
.bar-fill{height:3px;border-radius:2px;transition:width .3s}
.rtag{font-size:10px;color:#378ADD;margin-left:6px;font-weight:400}
.done-msg{font-size:13px;color:var(--color-text-secondary);text-align:center;padding:1rem;border:0.5px dashed var(--color-border-tertiary);border-radius:var(--border-radius-md);margin-top:4px}
.hint{font-size:11px;color:var(--color-text-tertiary);margin-bottom:1.25rem;margin-top:-0.5rem}
.rst{background:none;border:none;cursor:pointer;font-size:11px;color:var(--color-text-tertiary);text-decoration:underline;padding:0;font-family:var(--font-sans);margin-left:auto}
.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px;margin-bottom:1.5rem}
.sum-card{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:8px 10px;text-align:center}
.sum-num{font-size:20px;font-weight:500;color:var(--color-text-primary)}
.sum-lbl{font-size:10px;color:var(--color-text-secondary);margin-top:2px}
/* Admin */
#adm-foot{padding-top:.75rem;margin-top:.75rem;border-top:0.5px solid var(--color-border-tertiary);text-align:right}
.adm-pw-wrap{margin-top:.5rem;display:flex;align-items:center;gap:6px;justify-content:flex-end;flex-wrap:wrap}
.adm-pw-err{font-size:11px;color:#A32D2D;width:100%;text-align:right}
.adm-wrap{padding:1rem 0}
.adm-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;padding-bottom:.75rem;border-bottom:0.5px solid var(--color-border-tertiary)}
.adm-nav{display:flex;gap:6px}
.adm-nav-btn{background:none;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:5px 11px;font-size:12px;cursor:pointer;color:var(--color-text-secondary);font-family:var(--font-sans)}
.adm-nav-btn.active{border-color:var(--color-border-primary);color:var(--color-text-primary);background:var(--color-background-secondary);font-weight:500}
.adm-back{font-size:11px;color:var(--color-text-tertiary);cursor:pointer;background:none;border:none;padding:0;font-family:var(--font-sans)}
.adm-back:hover{color:var(--color-text-secondary)}
.adm-sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem}
.adm-sec-title{font-size:13px;font-weight:500;color:var(--color-text-primary)}
.adm-list-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:0.5px solid var(--color-border-tertiary)}
.adm-list-row:last-child{border-bottom:none}
.adm-list-name{flex:1;font-size:13px;color:var(--color-text-primary)}
.adm-list-meta{font-size:11px;color:var(--color-text-secondary);flex-shrink:0}
.adm-btn{background:none;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:3px 9px;font-size:11px;cursor:pointer;color:var(--color-text-secondary);font-family:var(--font-sans);flex-shrink:0}
.adm-btn:hover{border-color:var(--color-border-primary);color:var(--color-text-primary)}
.adm-btn-p{border-color:var(--color-border-primary);color:var(--color-text-primary);font-weight:500}
.adm-btn-d{border-color:transparent;color:var(--color-text-tertiary)}
.adm-btn-d.conf{color:#A32D2D;border-color:#A32D2D}
.adm-form{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:12px;margin-top:.75rem}
.adm-field{margin-bottom:.75rem}
.adm-lbl{font-size:11px;color:var(--color-text-secondary);display:block;margin-bottom:3px}
.adm-inp{width:100%;background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:6px 9px;font-size:12px;color:var(--color-text-primary);font-family:var(--font-sans);outline:none;box-sizing:border-box}
.adm-inp:focus{border-color:var(--color-border-primary)}
.adm-ta{height:72px;resize:vertical}
.adm-clr-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.adm-sw{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .15s;flex-shrink:0}
.adm-sw:hover{transform:scale(1.2)}
.adm-sw.sel{border-color:var(--color-text-primary);transform:scale(1.15)}
.adm-row-btns{display:flex;gap:6px;justify-content:flex-end;margin-top:.5rem}
.adm-tags{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.adm-tag-chk{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--color-text-secondary);cursor:pointer;user-select:none}
.adm-res-hdr{display:grid;grid-template-columns:1fr 1fr 110px 28px;gap:6px;margin-bottom:4px}
.adm-res-hdr span{font-size:10px;color:var(--color-text-tertiary)}
.adm-res-row{display:grid;grid-template-columns:1fr 1fr 110px 28px;gap:6px;align-items:center;margin-bottom:5px}
.adm-p2{font-size:12px;color:var(--color-text-tertiary);padding:.875rem;border:0.5px dashed var(--color-border-tertiary);border-radius:var(--border-radius-md);text-align:center;margin-bottom:.75rem}
.adm-lnk{background:none;border:none;cursor:pointer;font-size:11px;color:var(--color-text-tertiary);padding:0;font-family:var(--font-sans)}
.adm-lnk:hover{color:var(--color-text-secondary)}
</style>

<div id="tracker-view" style="padding:1rem 0">

<div class="legend">
  <span class="leg-it"><span style="width:9px;height:9px;border-radius:50%;border:2px solid #888780;background:transparent;display:inline-block;flex-shrink:0"></span>Not started</span>
  <span class="leg-it"><span style="width:9px;height:9px;border-radius:50%;background:#EF9F27;display:inline-block"></span>Aware</span>
  <span class="leg-it"><span style="width:9px;height:9px;border-radius:50%;background:#378ADD;display:inline-block"></span>Learning</span>
  <span class="leg-it"><span style="width:9px;height:9px;border-radius:50%;background:#1D9E75;display:inline-block"></span>Proficient</span>
  <span class="leg-it"><span style="width:9px;height:9px;border-radius:50%;background:#639922;display:inline-block"></span>Expert</span>
  <button class="rst" id="rst-btn" onclick="doReset()">reset all</button>
</div>

<div class="summary-grid" id="sum-grid"></div>
<div class="tabs" id="tabs"></div>
<div id="view"></div>

</div>

<div id="adm-foot">
  <button class="adm-lnk" onclick="adminEntry()">Admin</button>
  <div class="adm-pw-wrap" id="adm-pw-wrap" style="display:none">
    <input type="password" class="adm-inp" id="adm-pw-inp" placeholder="Passphrase" style="width:150px" onkeydown="if(event.key==='Enter')adminCheck()">
    <button class="adm-btn adm-btn-p" onclick="adminCheck()">Enter</button>
    <span class="adm-pw-err" id="adm-pw-err" style="display:none">Incorrect passphrase.</span>
  </div>
</div>

<div id="adm-panel" style="display:none">
  <div class="adm-wrap">
    <div class="adm-hdr">
      <div class="adm-nav">
        <button class="adm-nav-btn active" id="adm-n-tracks" onclick="admNav('tracks')">Tracks</button>
        <button class="adm-nav-btn" id="adm-n-skills" onclick="admNav('skills')">Skills</button>
        <button class="adm-nav-btn" id="adm-n-roles" onclick="admNav('roles')">Roles</button>
      </div>
      <button class="adm-back" onclick="adminExit()">← Back to tracker</button>
    </div>
    <div id="adm-content"></div>
  </div>
</div>

<script>
let T={
  azure:{label:'Azure Cloud',color:'#378ADD',skills:[
    {id:'az1',name:'Resource Model & Azure CLI',tags:[]},
    {id:'az2',name:'Networking — VNets, NSGs, DNS',tags:[]},
    {id:'az3',name:'Identity & Entra ID',tags:['Platform Eng']},
    {id:'az4',name:'Key Vault & Secrets Mgmt',tags:['Platform Eng']},
    {id:'az5',name:'Azure Functions',tags:[]},
    {id:'az6',name:'Static Web Apps',tags:['Web Dev']},
    {id:'az7',name:'Container Apps',tags:[]},
    {id:'az8',name:'Bicep / Infrastructure as Code',tags:['Platform Eng']},
    {id:'az9',name:'Monitor & Log Analytics',tags:['Platform Eng']},
    {id:'az10',name:'Policy & Governance',tags:[]}
  ]},
  ai:{label:'AI Engineering',color:'#7F77DD',skills:[
    {id:'ai1',name:'LLM Fundamentals',tags:[]},
    {id:'ai2',name:'Prompt Engineering',tags:[]},
    {id:'ai3',name:'Azure OpenAI Service',tags:['Azure']},
    {id:'ai4',name:'RAG & Embeddings',tags:[]},
    {id:'ai5',name:'Vector Databases',tags:[]},
    {id:'ai6',name:'AI Agents & MCP',tags:[]},
    {id:'ai7',name:'LLM Orchestration',tags:[]},
    {id:'ai8',name:'Model Evaluation & Testing',tags:[]},
    {id:'ai9',name:'Fine-tuning Concepts',tags:[]}
  ]},
  staff:{label:'Staff Engineering',color:'#1D9E75',skills:[
    {id:'se1',name:'System Design',tags:[]},
    {id:'se2',name:'Architecture Decision Records',tags:[]},
    {id:'se3',name:'Technical Documentation',tags:[]},
    {id:'se4',name:'Engineering Metrics & KPIs',tags:['Platform Eng']},
    {id:'se5',name:'Mentoring & Coaching',tags:[]},
    {id:'se6',name:'Cross-functional Communication',tags:[]},
    {id:'se7',name:'Platform Strategy',tags:['Platform Eng']},
    {id:'se8',name:'Tech Roadmapping',tags:[]}
  ]},
  web:{label:'Web Dev',color:'#D85A30',skills:[
    {id:'wd1',name:'HTML & CSS Foundations',tags:[]},
    {id:'wd2',name:'JavaScript & TypeScript',tags:[]},
    {id:'wd3',name:'React',tags:[]},
    {id:'wd4',name:'Next.js',tags:[]},
    {id:'wd5',name:'REST API Design',tags:[]},
    {id:'wd6',name:'Auth Patterns — OAuth/OIDC',tags:['Azure']},
    {id:'wd7',name:'Performance & Core Web Vitals',tags:[]},
    {id:'wd8',name:'Deployment & CI-CD',tags:['Platform Eng']}
  ]},
  platform:{label:'Platform Engineering',color:'#BA7517',skills:[
    {id:'pe1',name:'Observability Strategy',tags:['Azure']},
    {id:'pe2',name:'GitHub Actions & CI-CD',tags:['Web Dev']},
    {id:'pe3',name:'Infrastructure as Code',tags:['Azure']},
    {id:'pe4',name:'Zero Trust & Cloudflare',tags:[]},
    {id:'pe5',name:'Platform Metrics & SLOs',tags:['Staff Eng']},
    {id:'pe6',name:'Incident Management',tags:[]},
    {id:'pe7',name:'Developer Experience (DevX)',tags:[]},
    {id:'pe8',name:'Cloud Cost Management',tags:[]}
  ]}
};

// PHASE 1 ONLY — replace with Entra auth in Phase 2
const PASSPHRASE='portal2025';
const TCOLORS=['#378ADD','#7F77DD','#1D9E75','#D85A30','#BA7517'];
const RTYPES=['Official docs','Course','Video','Internal'];
const ROLES=[
  {name:'Junior Engineer',floors:{azure:25,web:25}},
  {name:'Engineer',floors:{azure:50,web:50,staff:25,platform:25}},
  {name:'Senior Engineer',floors:{azure:75,web:50,staff:50,platform:50,ai:25}},
  {name:'Staff Engineer',floors:{azure:75,staff:75,platform:75,ai:50}}
];

const STS=['none','aware','learning','proficient','expert'];
const SC={
  none:{dot:'transparent',bdr:'#888780',txt:'#888780',lbl:'Not started',sc:0},
  aware:{dot:'#EF9F27',bdr:'#EF9F27',txt:'#BA7517',lbl:'Aware',sc:.25},
  learning:{dot:'#378ADD',bdr:'#378ADD',txt:'#185FA5',lbl:'Learning',sc:.5},
  proficient:{dot:'#1D9E75',bdr:'#1D9E75',txt:'#0F6E56',lbl:'Proficient',sc:.75},
  expert:{dot:'#639922',bdr:'#639922',txt:'#3B6D11',lbl:'Expert',sc:1}
};

let st={},act='azure',sv,resetPending=false,resetTimer;

const gs=id=>st[id]||{status:'none'};

function cycle(id){
  const cur=gs(id).status;
  st[id]={status:STS[(STS.indexOf(cur)+1)%STS.length]};
  clearTimeout(sv);sv=setTimeout(save,700);
  render(act);renderSummary();
}

async function save(){try{await window.storage.set('skm3',JSON.stringify(st))}catch(e){}}

async function loadData(){
  try{const c=await window.storage.get('skm3-cfg');if(c&&c.value)T=JSON.parse(c.value)}catch(e){}
  try{const r=await window.storage.get('skm3');if(r&&r.value)st=JSON.parse(r.value)}catch(e){st={}}
  ra();
}

function doReset(){
  const btn=document.getElementById('rst-btn');
  if(!resetPending){
    resetPending=true;
    btn.textContent='confirm reset?';
    btn.style.color='var(--color-text-danger,#A32D2D)';
    resetTimer=setTimeout(()=>{
      resetPending=false;
      btn.textContent='reset all';
      btn.style.color='';
    },3000);
    return;
  }
  clearTimeout(resetTimer);resetPending=false;
  btn.textContent='reset all';btn.style.color='';
  st={};
  try{window.storage.delete('skm3')}catch(e){}
  ra();
}

function prog(k){
  const sk=T[k].skills;
  return Math.round(sk.reduce((a,s)=>a+SC[gs(s.id).status].sc,0)/sk.length*100);
}

function totalStats(){
  let tot=0,done=0,inprog=0;
  Object.values(T).forEach(t=>t.skills.forEach(s=>{
    tot++;
    const ss=gs(s.id).status;
    if(ss==='proficient'||ss==='expert')done++;
    else if(ss==='learning'||ss==='aware')inprog++;
  }));
  return{tot,done,inprog,notStarted:tot-done-inprog};
}

function ri(k){
  const sk=T[k].skills;
  for(let i=0;i<sk.length;i++){const s=gs(sk[i].id).status;if(s==='none'||s==='aware'||s==='learning')return i;}
  return -1;
}

function renderSummary(){
  const {tot,done,inprog,notStarted}=totalStats();
  const overall=Math.round(Object.keys(T).reduce((a,k)=>a+prog(k),0)/Object.keys(T).length);
  document.getElementById('sum-grid').innerHTML=`
    <div class="sum-card"><div class="sum-num">${overall}%</div><div class="sum-lbl">overall progress</div></div>
    <div class="sum-card"><div class="sum-num" style="color:#639922">${done}</div><div class="sum-lbl">mastered</div></div>
    <div class="sum-card"><div class="sum-num" style="color:#378ADD">${inprog}</div><div class="sum-lbl">in progress</div></div>
    <div class="sum-card"><div class="sum-num" style="color:var(--color-text-tertiary)">${notStarted}</div><div class="sum-lbl">not started</div></div>`;
}

function renderTabs(){
  document.getElementById('tabs').innerHTML=Object.entries(T).map(([k,t])=>`
    <button class="tab-btn${k===act?' active':''}" onclick="sw('${k}')">${t.label} <span style="font-size:10px;opacity:.6">${prog(k)}%</span></button>`
  ).join('');
}

function render(k){
  const t=T[k],p=prog(k),r=ri(k);
  let h=`<div class="sum-row"><span class="tk-title">${t.label}</span><span class="tk-pct">${p}% mastered</span></div>
<div class="pb-bg"><div class="pb-fill" style="width:${p}%;background:${t.color}"></div></div>
<p class="hint">Click a skill to cycle status. Tags show where skills cross into other tracks.</p>`;
  t.skills.forEach((s,i)=>{
    const ss=gs(s.id).status,sc=SC[ss],res=i===r;
    const ov=s.tags.length?`<div class="ov">also in: ${s.tags.join(', ')}</div>`:'';
    h+=`<div class="sk-row">
<div class="dot" style="background:${sc.dot};border-color:${sc.bdr}" onclick="cycle('${s.id}')"></div>
<div class="sk-card${res?' rh':''}" onclick="cycle('${s.id}')">
  <div class="card-top">
    <span class="sk-nm">${s.name}${res?'<span class="rtag">↑ continue here</span>':''}</span>
    <span class="pill" style="color:${sc.txt};border-color:${sc.bdr};background:transparent">${sc.lbl}</span>
  </div>${ov}
  <div class="bar-bg"><div class="bar-fill" style="width:${Math.round(sc.sc*100)}%;background:${t.color}"></div></div>
</div></div>`;
  });
  if(r===-1&&p>0)h+=`<div class="done-msg">All skills at proficient or expert — track complete.</div>`;
  document.getElementById('view').innerHTML=h;
  renderTabs();
}

function sw(k){act=k;render(k)}
function ra(){renderSummary();renderTabs();render(act)}
loadData();

// ── Admin ──────────────────────────────────────────────────────────────────
let admSec='tracks',admEditTk=null,admEditSk=null,admSkRmPend={},admTkFilter='all';

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

async function admSaveConfig(){try{await window.storage.set('skm3-cfg',JSON.stringify(T))}catch(e){}}

function adminEntry(){
  if(sessionStorage.getItem('adm-auth')==='1'){adminShow();return;}
  const w=document.getElementById('adm-pw-wrap');
  w.style.display=w.style.display==='none'?'flex':'none';
  if(w.style.display==='flex')setTimeout(()=>document.getElementById('adm-pw-inp').focus(),50);
}

function adminCheck(){
  const v=document.getElementById('adm-pw-inp').value;
  const err=document.getElementById('adm-pw-err');
  if(v===PASSPHRASE){
    sessionStorage.setItem('adm-auth','1');
    document.getElementById('adm-pw-wrap').style.display='none';
    document.getElementById('adm-pw-inp').value='';
    err.style.display='none';
    adminShow();
  } else {
    err.style.display='block';
    document.getElementById('adm-pw-inp').value='';
    document.getElementById('adm-pw-inp').focus();
  }
}

function adminShow(){
  document.getElementById('tracker-view').style.display='none';
  document.getElementById('adm-foot').style.display='none';
  document.getElementById('adm-panel').style.display='';
  admNav(admSec);
}

function adminExit(){
  document.getElementById('adm-panel').style.display='none';
  document.getElementById('tracker-view').style.display='';
  document.getElementById('adm-foot').style.display='';
  ra();
}

function admNav(sec){
  admSec=sec;
  ['tracks','skills','roles'].forEach(s=>document.getElementById('adm-n-'+s).classList.toggle('active',s===sec));
  if(sec==='tracks')admRenderTracks();
  else if(sec==='skills')admRenderSkills();
  else admRenderRoles();
}

// ── Tracks ─────────────────────────────────────────────────────────────────

function admRenderTracks(){
  admEditTk=null;
  let h=`<div class="adm-sec-hdr"><span class="adm-sec-title">Tracks</span><button class="adm-btn adm-btn-p" onclick="admNewTrack()">+ Add track</button></div><div id="adm-tk-list">`;
  Object.entries(T).forEach(([k,t])=>{
    h+=`<div class="adm-list-row">
<span style="width:10px;height:10px;border-radius:50%;background:${t.color};display:inline-block;flex-shrink:0"></span>
<span class="adm-list-name">${esc(t.label)}</span>
<span class="adm-list-meta">${t.skills.length} skill${t.skills.length===1?'':'s'}</span>
<button class="adm-btn" onclick="admEditTrack('${k}')">Edit</button>
</div>`;
  });
  h+=`</div><div id="adm-tk-form"></div>`;
  document.getElementById('adm-content').innerHTML=h;
}

function admEditTrack(k){admShowTrackForm(k,T[k].label,T[k].color);}
function admNewTrack(){admShowTrackForm(null,'',TCOLORS[0]);}

function admShowTrackForm(k,label,color){
  admEditTk=k;
  const isNew=!k;
  const swatches=TCOLORS.map(c=>`<span class="adm-sw${c===color?' sel':''}" style="background:${c}" onclick="admSelColor('${c}')" data-c="${c}"></span>`).join('');
  document.getElementById('adm-tk-form').innerHTML=`
<div class="adm-form">
  <div class="adm-field"><label class="adm-lbl">Track name</label><input class="adm-inp" id="tf-name" value="${esc(label)}"></div>
  <div class="adm-field"><label class="adm-lbl">ID (no spaces${!isNew?' — fixed after creation':''})</label><input class="adm-inp" id="tf-id" value="${esc(k||'')}"${!isNew?' disabled':''}></div>
  <div class="adm-field"><label class="adm-lbl">Color</label><div class="adm-clr-row" id="tf-colors">${swatches}</div><input type="hidden" id="tf-color" value="${color}"></div>
  <div class="adm-row-btns">
    <button class="adm-btn" onclick="admCancelTk()">Cancel</button>
    <button class="adm-btn adm-btn-p" onclick="admSaveTk()">Save track</button>
  </div>
</div>`;
}

function admSelColor(c){
  document.getElementById('tf-color').value=c;
  document.querySelectorAll('#tf-colors .adm-sw').forEach(s=>s.classList.toggle('sel',s.dataset.c===c));
}

function admCancelTk(){document.getElementById('adm-tk-form').innerHTML='';admEditTk=null;}

async function admSaveTk(){
  const name=document.getElementById('tf-name').value.trim();
  const id=(admEditTk||document.getElementById('tf-id').value.trim().replace(/\s+/g,'_').toLowerCase());
  const color=document.getElementById('tf-color').value;
  if(!name||!id)return;
  if(!admEditTk){
    if(T[id])return; // ID already exists
    T[id]={label:name,color,skills:[]};
  } else {
    T[admEditTk].label=name;
    T[admEditTk].color=color;
  }
  await admSaveConfig();
  ra();
  admRenderTracks();
}

// ── Skills ─────────────────────────────────────────────────────────────────

function admRenderSkills(){
  admEditSk=null;
  const opts=Object.entries(T).map(([k,t])=>`<option value="${k}"${k===admTkFilter?' selected':''}>${esc(t.label)}</option>`).join('');
  let h=`<div class="adm-sec-hdr">
<div style="display:flex;align-items:center;gap:8px">
  <span class="adm-sec-title">Skills</span>
  <select class="adm-inp" style="width:auto;font-size:11px;padding:3px 7px" onchange="admTkFilter=this.value;admRenderSkills()"><option value="all">All tracks</option>${opts}</select>
</div>
<button class="adm-btn adm-btn-p" onclick="admNewSkill()">+ Add skill</button></div>
<div id="adm-sk-list">`;
  let found=false;
  Object.entries(T).forEach(([k,t])=>{
    if(admTkFilter!=='all'&&k!==admTkFilter)return;
    t.skills.forEach(s=>{
      found=true;
      h+=`<div class="adm-list-row" id="row-${s.id}">
<span style="width:8px;height:8px;border-radius:50%;background:${t.color};display:inline-block;flex-shrink:0"></span>
<span class="adm-list-name">${esc(s.name)}</span>
<span class="adm-list-meta">${esc(t.label)}</span>
<button class="adm-btn" onclick="admEditSkill('${k}','${s.id}')">Edit</button>
<button class="adm-btn adm-btn-d" id="rm-${s.id}" onclick="admRemSkill('${k}','${s.id}')">Remove</button>
</div>`;
    });
  });
  if(!found)h+=`<p style="font-size:12px;color:var(--color-text-tertiary);margin:.5rem 0">No skills yet.</p>`;
  h+=`</div><div id="adm-sk-form"></div>`;
  document.getElementById('adm-content').innerHTML=h;
}

function admRemSkill(tk,sid){
  const btn=document.getElementById('rm-'+sid);
  if(admSkRmPend[sid]){
    T[tk].skills=T[tk].skills.filter(s=>s.id!==sid);
    delete admSkRmPend[sid];
    admSaveConfig();
    ra();
    admRenderSkills();
  } else {
    admSkRmPend[sid]=true;
    btn.textContent='Confirm remove';
    btn.classList.add('conf');
    setTimeout(()=>{
      if(admSkRmPend[sid]){delete admSkRmPend[sid];if(btn){btn.textContent='Remove';btn.classList.remove('conf');}}
    },3000);
  }
}

function admEditSkill(tk,sid){admShowSkillForm(tk,T[tk].skills.find(x=>x.id===sid));}
function admNewSkill(){admShowSkillForm(admTkFilter!=='all'?admTkFilter:Object.keys(T)[0],null);}

function admShowSkillForm(tk,s){
  admEditSk={tk,sid:s?.id};
  const tkOpts=Object.entries(T).map(([k,t])=>`<option value="${k}"${k===tk?' selected':''}>${esc(t.label)}</option>`).join('');
  const tagChecks=Object.entries(T).map(([k,t])=>{
    const chk=s?.tags?.includes(t.label)?'checked':'';
    return `<label class="adm-tag-chk"><input type="checkbox" value="${esc(t.label)}" ${chk}> ${esc(t.label)}</label>`;
  }).join('');
  const typeOpts=tk=>RTYPES.map(t=>`<option${t===tk?' selected':''}>${t}</option>`).join('');
  const resRows=(s?.resources||[]).map(r=>`<div class="adm-res-row">
<input class="adm-inp" placeholder="Title" value="${esc(r.title)}">
<input class="adm-inp" placeholder="URL" value="${esc(r.url)}">
<select class="adm-inp">${typeOpts(r.type)}</select>
<button class="adm-btn adm-btn-d" style="padding:2px 6px" onclick="this.closest('.adm-res-row').remove()">×</button>
</div>`).join('');
  document.getElementById('adm-sk-form').innerHTML=`
<div class="adm-form">
  <div class="adm-field"><label class="adm-lbl">Skill name</label><input class="adm-inp" id="sf-name" value="${esc(s?.name||'')}"></div>
  <div class="adm-field"><label class="adm-lbl">Track</label><select class="adm-inp" id="sf-tk">${tkOpts}</select></div>
  <div class="adm-field"><label class="adm-lbl">Summary</label><textarea class="adm-inp adm-ta" id="sf-summary">${esc(s?.summary||'')}</textarea></div>
  <div class="adm-field"><label class="adm-lbl">Cheat sheet URL</label><input class="adm-inp" id="sf-cs" value="${esc(s?.cheatSheets?.[0]||'')}"></div>
  <div class="adm-field"><label class="adm-lbl">Cross-track tags</label><div class="adm-tags" id="sf-tags">${tagChecks}</div></div>
  <div class="adm-field"><label class="adm-lbl">Resources</label>
    <div class="adm-res-hdr"><span>Title</span><span>URL</span><span>Type</span><span></span></div>
    <div id="sf-res-list">${resRows}</div>
    <button class="adm-btn" style="margin-top:4px" onclick="admAddRes()">+ Add resource</button>
  </div>
  <div class="adm-row-btns">
    <button class="adm-btn" onclick="admCancelSk()">Cancel</button>
    <button class="adm-btn adm-btn-p" onclick="admSaveSk()">Save skill</button>
  </div>
</div>`;
  document.getElementById('adm-sk-form').scrollIntoView({behavior:'smooth',block:'nearest'});
}

function admAddRes(){
  const typeOpts=RTYPES.map(t=>`<option>${t}</option>`).join('');
  const row=document.createElement('div');
  row.className='adm-res-row';
  row.innerHTML=`<input class="adm-inp" placeholder="Title"><input class="adm-inp" placeholder="URL"><select class="adm-inp">${typeOpts}</select><button class="adm-btn adm-btn-d" style="padding:2px 6px" onclick="this.closest('.adm-res-row').remove()">×</button>`;
  document.getElementById('sf-res-list').appendChild(row);
}

function admGetRes(){
  return Array.from(document.querySelectorAll('#sf-res-list .adm-res-row')).map(row=>{
    const inp=row.querySelectorAll('input');
    return{title:inp[0].value.trim(),url:inp[1].value.trim(),type:row.querySelector('select').value};
  }).filter(r=>r.title||r.url);
}

function admCancelSk(){document.getElementById('adm-sk-form').innerHTML='';admEditSk=null;}

async function admSaveSk(){
  const name=document.getElementById('sf-name').value.trim();
  const newTk=document.getElementById('sf-tk').value;
  if(!name)return;
  const summary=document.getElementById('sf-summary').value.trim();
  const cs=document.getElementById('sf-cs').value.trim();
  const tags=Array.from(document.querySelectorAll('#sf-tags input:checked')).map(x=>x.value);
  const resources=admGetRes();
  if(admEditSk?.sid){
    const oldTk=admEditSk.tk;
    const idx=T[oldTk].skills.findIndex(x=>x.id===admEditSk.sid);
    if(idx>-1){
      const updated={...T[oldTk].skills[idx],name,summary,cheatSheets:cs?[cs]:[],tags,resources};
      if(oldTk===newTk){
        T[oldTk].skills[idx]=updated;
      } else {
        T[oldTk].skills.splice(idx,1);
        T[newTk].skills.push(updated);
      }
    }
  } else {
    const id=newTk.slice(0,2)+Date.now().toString().slice(-5);
    T[newTk].skills.push({id,name,summary,cheatSheets:cs?[cs]:[],tags,resources:resources});
  }
  await admSaveConfig();
  admEditSk=null;
  admTkFilter=newTk;
  ra();
  admRenderSkills();
}

// ── Roles ──────────────────────────────────────────────────────────────────

function admRenderRoles(){
  let h=`<div class="adm-sec-hdr"><span class="adm-sec-title">Roles</span></div>
<div class="adm-p2">Role editing is available in Phase 2.</div>`;
  ROLES.forEach(r=>{
    const floors=Object.entries(r.floors).map(([k,v])=>`${T[k]?.label||k}: ${v}%`).join(' · ');
    h+=`<div class="adm-list-row"><span class="adm-list-name">${esc(r.name)}</span><span class="adm-list-meta">${floors}</span></div>`;
  });
  document.getElementById('adm-content').innerHTML=h;
}
</script>
